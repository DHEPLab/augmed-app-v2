version: '3'

tasks:
  default:
    cmds:
      - task --list-all
    silent: true
  build:
    cmds:
      - docker build --tag augmed-app -f build/Dockerfile .
    silent: true
  up:
    cmds:
      - docker compose -f ./deploy/docker-compose.yml up -d
    silent: true
  down:
    cmds:
      - docker compose -f ./deploy/docker-compose.yml down
    silent: true